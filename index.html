<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive WebGL Molten Surface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }

        canvas {
            display: block;
        }

        #info {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
            padding: 1.5rem 2.5rem;
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 1rem;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: opacity 1.5s ease-out;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #info h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        #info p {
            font-size: 0.9rem;
            font-weight: 300;
            margin-top: 0.5rem;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div id="info">
        <h1>Chromaflux</h1>
        <p>Disturb the liquid metal</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module">
        // --- Scene Setup ---
        let scene, camera, renderer, plane, cubeCamera, controls;
        let mouse = new THREE.Vector2(-10, -10); // Start mouse off-screen
        let targetIntensity = 0.0;
        let currentIntensity = 0.0;
        let clock = new THREE.Clock();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 7);
            camera.lookAt(scene.position);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // --- Skybox and Environment ---
            const skyGeometry = new THREE.SphereGeometry(500, 32, 32);
            const skyMaterial = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 v_position;
                    void main() {
                        v_position = position;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 v_position;
                    void main() {
                        // Create a simple gradient for the sky
                        vec3 topColor = vec3(1.0, 0.5, 0.1); // Orange/Red sunset
                        vec3 bottomColor = vec3(0.1, 0.0, 0.4); // Deep Purple
                        float h = normalize(v_position).y;
                        vec3 finalColor = mix(bottomColor, topColor, max(pow(max(h, 0.0), 0.8), 0.0));
                        gl_FragColor = vec4(finalColor, 1.0);
                    }
                `,
                side: THREE.BackSide
            });
            const skybox = new THREE.Mesh(skyGeometry, skyMaterial);
            scene.add(skybox);

            // --- Reflection Camera ---
            const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(256, {
                format: THREE.RGBFormat,
                generateMipmaps: true,
                minFilter: THREE.LinearMipmapLinearFilter
            });
            cubeCamera = new THREE.CubeCamera(1, 1000, cubeRenderTarget);
            scene.add(cubeCamera);


            // --- Water Plane ---
            const geometry = new THREE.PlaneGeometry(30, 30, 200, 200);
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    u_time: { value: 0.0 },
                    u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
                    u_intensity: { value: 0.0 },
                    t_envMap: { value: cubeRenderTarget.texture }
                },
                vertexShader: `
                    uniform float u_time;
                    uniform vec2 u_mouse;
                    uniform float u_intensity;

                    varying vec3 v_worldPosition;
                    varying vec3 v_normal;

                    // Simplex Noise function
                    vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
                    vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
                    vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
                    vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
                    float snoise(vec3 v) {
                      const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                      const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                      vec3 i  = floor(v + dot(v, C.yyy) );
                      vec3 x0 =   v - i + dot(i, C.xxx) ;
                      vec3 g = step(x0.yzx, x0.xyz);
                      vec3 l = 1.0 - g;
                      vec3 i1 = min( g.xyz, l.zxy );
                      vec3 i2 = max( g.xyz, l.zxy );
                      vec3 x1 = x0 - i1 + C.xxx;
                      vec3 x2 = x0 - i2 + C.yyy;
                      vec3 x3 = x0 - D.yyy;
                      i = mod289(i);
                      vec4 p = permute( permute( permute(
                                 i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                               + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
                               + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                      float n_ = 0.142857142857; // 1.0/7.0
                      vec3  ns = n_ * D.wyz - D.xzx;
                      vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                      vec4 x_ = floor(j * ns.z);
                      vec4 y_ = floor(j - 7.0 * x_ );
                      vec4 x = x_ *ns.x + ns.yyyy;
                      vec4 y = y_ *ns.x + ns.yyyy;
                      vec4 h = 1.0 - abs(x) - abs(y);
                      vec4 b0 = vec4( x.xy, y.xy );
                      vec4 b1 = vec4( x.zw, y.zw );
                      vec4 s0 = floor(b0)*2.0 + 1.0;
                      vec4 s1 = floor(b1)*2.0 + 1.0;
                      vec4 sh = -step(h, vec4(0.0));
                      vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
                      vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
                      vec3 p0 = vec3(a0.xy,h.x);
                      vec3 p1 = vec3(a0.zw,h.y);
                      vec3 p2 = vec3(a1.xy,h.z);
                      vec3 p3 = vec3(a1.zw,h.w);
                      vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
                      p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                      vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                      m = m * m;
                      return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
                    }

                    void main() {
                        // Base wave motion
                        float noise = snoise(vec3(position.x * 0.1, position.y * 0.1, u_time * 0.2)) * 0.5;

                        // Mouse ripple effect
                        float dist = distance(uv, u_mouse);
                        float ripple = sin(dist * 30.0 - u_time * 5.0) * u_intensity * 0.5;
                        ripple = max(0.0, ripple);
                        ripple *= smoothstep(0.4, 0.0, dist);

                        // Combine motions
                        vec3 newPosition = position;
                        newPosition.z += noise + ripple;

                        v_worldPosition = (modelMatrix * vec4(newPosition, 1.0)).xyz;

                        // Calculate normals for lighting/reflection
                        float dx = snoise(vec3((position.x + 0.1) * 0.1, position.y * 0.1, u_time * 0.2)) * 0.5;
                        float dy = snoise(vec3(position.x * 0.1, (position.y + 0.1) * 0.1, u_time * 0.2)) * 0.5;
                        v_normal = normalize(vec3( (newPosition.z - dx) * 0.5, (newPosition.z - dy) * 0.5, 0.1));

                        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform samplerCube t_envMap;

                    varying vec3 v_worldPosition;
                    varying vec3 v_normal;

                    void main() {
                        // Calculate reflection vector
                        vec3 viewDir = normalize(v_worldPosition - cameraPosition);
                        vec3 reflectDir = reflect(viewDir, normalize(v_normal));

                        // Sample the environment map
                        vec4 envColor = textureCube(t_envMap, reflectDir);

                        // Fresnel effect for more realistic reflections
                        float fresnel = 1.0 - abs(dot(viewDir, normalize(v_normal)));
                        fresnel = pow(fresnel, 2.5);

                        // Base color of the liquid
                        vec3 baseColor = vec3(0.9, 0.5, 0.2); // Golden color

                        vec3 finalColor = mix(baseColor, envColor.rgb, fresnel);

                        gl_FragColor = vec4(finalColor, 1.0);
                    }
                `
            });

            plane = new THREE.Mesh(geometry, material);
            plane.rotation.x = -Math.PI / 2;
            scene.add(plane);

            // --- Event Listeners ---
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('pointermove', onPointerMove);
            document.addEventListener('pointerleave', () => { targetIntensity = 0.0; });

            // Fade out instructions
            setTimeout(() => {
                const info = document.getElementById('info');
                if (info) info.style.opacity = '0';
            }, 5000);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onPointerMove(event) {
            // Use a raycaster to find where the mouse intersects the plane
            let raycaster = new THREE.Raycaster();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = - (event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(plane);

            if (intersects.length > 0) {
                const uv = intersects[0].uv;
                plane.material.uniforms.u_mouse.value.copy(uv);
                targetIntensity = 1.0; // Set target intensity to max on mouse over
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Smoothly interpolate intensity for a more fluid feel
            currentIntensity += (targetIntensity - currentIntensity) * (delta * 5.0);

            // Update uniforms
            plane.material.uniforms.u_time.value = clock.getElapsedTime();
            plane.material.uniforms.u_intensity.value = currentIntensity;

            // Update reflection map
            plane.visible = false; // Hide water plane before rendering reflection
            cubeCamera.update(renderer, scene);
            plane.visible = true; // Unhide water plane

            renderer.render(scene, camera);
        }

        // --- Run ---
        init();
        animate();
    </script>
</body>

</html>
